<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f0f0f0"/>
  <text x="20" y="30" font-family="Arial" font-size="16" fill="#333">Stochastic Interpolation (0 &lt; eta &lt; 1)</text>
  <path d="M50 100 Q 200 50 350 100" stroke="#000" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M50 100 Q 200 150 350 100" stroke="#888" stroke-width="1" fill="none" stroke-dasharray="5,5"/>
  <circle cx="50" cy="100" r="10" fill="blue"/>
  <circle cx="350" cy="100" r="10" fill="green"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
  </defs>
  <text x="120" y="160" font-family="Arial" font-size="12" fill="purple">Noise Injection at each step</text>
</svg>