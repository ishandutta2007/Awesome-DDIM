<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f0f0f0"/>
  <text x="20" y="30" font-family="Arial" font-size="16" fill="#333">Deterministic DDIM (eta=0)</text>
  <path d="M50 100 L350 100" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <circle cx="50" cy="100" r="10" fill="blue"/>
  <text x="40" y="130" font-family="Arial" font-size="12">Noise (z_T)</text>
  <circle cx="350" cy="100" r="10" fill="green"/>
  <text x="330" y="130" font-family="Arial" font-size="12">Image (x_0)</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
  </defs>
  <text x="150" y="90" font-family="Arial" font-size="12" fill="red">Fixed Trajectory (ODE)</text>
</svg>